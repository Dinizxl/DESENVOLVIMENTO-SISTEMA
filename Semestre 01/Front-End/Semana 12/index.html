<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Aula de Performance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f4f4f4;
    }

    .produto {
      background-color: white;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 8px;
    }

    img {
      width: 250px;
      height: 160px;
      object-fit: cover;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Produtos da Loja</h1>
  <p>Exemplo simples para estudar performance no front-end.</p>

  <section id="produtos"></section>

  <script>
    const produtos = document.getElementById("produtos");
    let conteudo = "";

    for (let i = 1; i <= 10; i++) {
      conteudo += `
        <div class="produto">
          <h2>Produto ${i}</h2>
          <p>Descrição simples do produto ${i}.</p>
          <img src="https://picsum.photos/400/250?random=${i}" alt="Imagem do produto ${i}" loading="lazy">
        </div>
      `;
    }

    produtos.innerHTML = conteudo;
  </script>
</body>
</html>
